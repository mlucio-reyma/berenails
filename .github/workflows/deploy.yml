name: Deploy

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'preview' }}
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: ${{ startsWith(github.ref, 'refs/tags/') && 'Deploy → Producción 🚀' || 'Deploy → Preview 🔍' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy a Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=berenails
            ${{ startsWith(github.ref, 'refs/tags/') && '--branch=main' || '' }}

      - name: Comentar URL de preview en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url  = '${{ steps.deploy.outputs.deployment-url }}';
            const sha  = context.sha.substring(0, 7);
            const body = [
              '## 🔍 Preview desplegado',
              '',
              `**→ [Abrir preview](${url})**`,
              '',
              `| | |`,
              `|---|---|`,
              `| Branch | \`${{ github.head_ref }}\` |`,
              `| Commit | \`${sha}\` |`,
              `| Ambiente | Preview |`,
              '',
              '_Actualizado automáticamente con cada push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview desplegado')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Resumen de producción
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "## ✅ Deploy a producción exitoso" >> $GITHUB_STEP_SUMMARY
          echo "**Versión:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
